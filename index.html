<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AstroTrail Pro</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for parsing JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Register Service Worker for Offline Use -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</head>
<body class="bg-black text-white">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Inline SVG Icons (Replaces lucide-react) ---
    const Moon = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>;
    const Sun = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
    const Camera = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>;
    const Aperture = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="14.31" y1="8" x2="20.05" y2="17.94"/><line x1="9.69" y1="8" x2="21.17" y2="8"/><line x1="7.38" y1="12" x2="13.12" y2="2.06"/><line x1="9.69" y1="16" x2="3.95" y2="6.06"/><line x1="14.31" y1="16" x2="2.83" y2="16"/><line x1="16.62" y1="12" x2="10.88" y2="21.94"/></svg>;
    const Info = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
    const Save = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const Folder = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>;
    const Compass = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>;
    const Trash2 = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>;
    const Lock = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
    const Unlock = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>;
    const Star = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
    const XIcon = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;

    // --- App Component ---
    const SENSORS = [
      { id: 'ff', name: 'Full Frame', crop: 1.0, width: 36, aspect: 1.5 },
      { id: 'apsc_sn', name: 'APS-C (Sony/Nikon/Fuji)', crop: 1.5, width: 23.6, aspect: 1.5 },
      { id: 'apsc_c', name: 'APS-C (Canon)', crop: 1.6, width: 22.2, aspect: 1.5 },
      { id: 'm43', name: 'Micro Four Thirds', crop: 2.0, width: 17.3, aspect: 1.333 },
    ];

    function App() {
      const [nightMode, setNightMode] = useState(false);
      const [rule, setRule] = useState('500'); 
      const [isPro, setIsPro] = useState(false);
      const [showPaywall, setShowPaywall] = useState(false);

      const [sensorId, setSensorId] = useState('ff');
      const [focalLength, setFocalLength] = useState(14);
      const [aperture, setAperture] = useState(2.8);
      const [megapixels, setMegapixels] = useState(24);
      
      const [declination, setDeclination] = useState(0);
      const [profiles, setProfiles] = useState([]);
      const [newProfileName, setNewProfileName] = useState('');
      const [activeProfileId, setActiveProfileId] = useState('');

      useEffect(() => {
        const savedProfiles = localStorage.getItem('astroGearProfiles');
        if (savedProfiles) setProfiles(JSON.parse(savedProfiles));

        const savedProStatus = localStorage.getItem('astroProStatus');
        if (savedProStatus === 'true') setIsPro(true);
      }, []);

      const theme = {
        bg: nightMode ? "bg-black" : "bg-[#F9F6F0]",
        text: nightMode ? "text-[#FF0000]" : "text-[#2F3E36]",
        textMuted: nightMode ? "text-[#880000]" : "text-[#5B7065]",
        border: nightMode ? "border-[#FF0000]" : "border-[#2F3E36]",
        cardBg: nightMode ? "bg-black" : "bg-white",
        inputBg: nightMode ? "bg-black text-[#FF0000] placeholder-[#880000]" : "bg-[#F9F6F0] text-[#2F3E36] placeholder-[#A3B3A9]",
        inputBorder: nightMode ? "border-[#550000] focus:border-[#FF0000]" : "border-[#A3B3A9] focus:border-[#2F3E36]",
        btnActive: nightMode ? "bg-[#FF0000] text-black" : "bg-[#2F3E36] text-[#F9F6F0]",
        btnInactive: nightMode ? "bg-black text-[#FF0000] border border-[#FF0000]" : "bg-transparent text-[#2F3E36] border border-[#2F3E36]",
        slider: nightMode ? "accent-[#FF0000]" : "accent-[#2F3E36]",
        modalBg: nightMode ? "bg-black/90" : "bg-[#F9F6F0]/80",
      };

      const result = useMemo(() => {
        const sensor = SENSORS.find(s => s.id === sensorId);
        if (!focalLength || focalLength <= 0) return null;

        if (rule === '500') {
          return (500 / (focalLength * sensor.crop)).toFixed(1);
        } else {
          if (!aperture || !megapixels || megapixels <= 0) return null;
          const widthPx = Math.sqrt(megapixels * 1000000 * sensor.aspect);
          const pixelPitch = (sensor.width / widthPx) * 1000;
          const baseSpeed = (35 * aperture + 30 * pixelPitch) / focalLength;
          const safeDeclination = Math.min(declination, 89);
          const declinationAdjustment = Math.cos(safeDeclination * (Math.PI / 180));
          return (baseSpeed / declinationAdjustment).toFixed(1);
        }
      }, [rule, sensorId, focalLength, aperture, megapixels, declination]);

      const saveProfile = () => {
        if (!newProfileName.trim()) return;
        const newProfile = { id: Date.now().toString(), name: newProfileName, sensorId, focalLength, aperture, megapixels };
        const updatedProfiles = [...profiles, newProfile];
        setProfiles(updatedProfiles);
        localStorage.setItem('astroGearProfiles', JSON.stringify(updatedProfiles));
        setActiveProfileId(newProfile.id);
        setNewProfileName('');
      };

      const loadProfile = (id) => {
        const p = profiles.find(x => x.id === id);
        if (p) {
          setSensorId(p.sensorId); setFocalLength(p.focalLength);
          setAperture(p.aperture); setMegapixels(p.megapixels);
        }
      };

      const deleteProfile = (id) => {
        const updatedProfiles = profiles.filter(p => p.id !== id);
        setProfiles(updatedProfiles);
        localStorage.setItem('astroGearProfiles', JSON.stringify(updatedProfiles));
        if (activeProfileId === id) setActiveProfileId('');
      };

      const handleRuleChange = (selectedRule) => {
        if (selectedRule === 'npf' && !isPro) setShowPaywall(true);
        else setRule(selectedRule);
      };

      const simulatePurchase = () => {
        setIsPro(true);
        localStorage.setItem('astroProStatus', 'true');
        setShowPaywall(false);
        setRule('npf');
      };

      return (
        <div className={`min-h-screen w-full transition-colors duration-300 ${theme.bg} ${theme.text} p-4 sm:p-6 md:p-8 font-sans pb-20 relative`}>
          
          {showPaywall && (
            <div className={`fixed inset-0 z-50 flex items-center justify-center p-4 backdrop-blur-sm transition-all ${theme.modalBg}`}>
              <div className={`w-full max-w-sm p-6 rounded-2xl border-2 shadow-2xl relative ${theme.cardBg} ${theme.border}`}>
                <button onClick={() => setShowPaywall(false)} className={`absolute top-4 right-4 p-1 rounded-full border transition-colors ${theme.border} ${theme.textMuted} hover:opacity-70`}><XIcon size={20} /></button>
                <div className="flex justify-center mb-4"><div className={`p-4 rounded-full border-2 ${theme.border}`}><Star size={32} className={nightMode ? "text-[#FF0000]" : "text-[#2F3E36]"} /></div></div>
                <h2 className="text-2xl font-bold text-center mb-2 tracking-tight">Unlock AstroTrail Pro</h2>
                <p className={`text-center text-sm font-medium mb-6 ${theme.textMuted}`}>Get tack-sharp stars and eliminate trailing with advanced calculations.</p>
                <ul className="space-y-4 mb-8">
                  <li className="flex items-start gap-3"><Unlock size={20} className="shrink-0 mt-0.5" /><span className="text-sm font-semibold">Unlock the highly accurate NPF Rule calculation algorithm.</span></li>
                  <li className="flex items-start gap-3"><Compass size={20} className="shrink-0 mt-0.5" /><span className="text-sm font-semibold">Access the declination slider for extended exposure times near the poles.</span></li>
                  <li className="flex items-start gap-3"><Save size={20} className="shrink-0 mt-0.5" /><span className="text-sm font-semibold">Support an independent developer!</span></li>
                </ul>
                <button onClick={simulatePurchase} className={`w-full py-4 rounded-xl font-bold text-lg tracking-wide transition-transform hover:scale-[1.02] active:scale-95 ${theme.btnActive}`}>Purchase for $2.99</button>
                <p className={`text-center text-xs mt-3 ${theme.textMuted}`}>One-time payment. Yours forever.</p>
              </div>
            </div>
          )}

          <div className="max-w-md mx-auto">
            <div className="flex justify-between items-center mb-6">
              <div>
                <h1 className="text-2xl font-bold tracking-tight flex items-center gap-2">
                  AstroTrail {isPro && <span className="text-xs font-black px-2 py-0.5 rounded border border-current tracking-widest uppercase">Pro</span>}
                </h1>
                <p className={`text-sm ${theme.textMuted}`}>Exposure Calculator</p>
              </div>
              <button onClick={() => setNightMode(!nightMode)} className={`p-3 rounded-full transition-colors border ${theme.border} hover:opacity-80`}>
                {nightMode ? <Sun size={20} /> : <Moon size={20} />}
              </button>
            </div>

            <div className={`rounded-2xl p-5 mb-6 border transition-colors shadow-sm ${theme.border} ${theme.cardBg}`}>
              <label className="block text-sm font-bold mb-4 flex items-center gap-2 tracking-wide"><Folder size={18} /> GEAR PROFILES</label>
              {profiles.length > 0 && (
                <div className="flex gap-2 mb-4">
                  <select value={activeProfileId} onChange={(e) => {setActiveProfileId(e.target.value); loadProfile(e.target.value);}} className={`flex-1 p-3 rounded-xl border appearance-none outline-none font-medium transition-colors ${theme.inputBg} ${theme.inputBorder}`}>
                    <option value="" disabled>Load a saved profile...</option>
                    {profiles.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                  </select>
                  <button onClick={() => activeProfileId && deleteProfile(activeProfileId)} disabled={!activeProfileId} className={`p-3 rounded-xl transition-colors border ${theme.border} flex items-center justify-center disabled:opacity-30 ${nightMode ? 'hover:bg-[#FF0000] hover:text-black' : 'hover:bg-red-50 text-red-500 border-red-200'}`}><Trash2 size={18} /></button>
                </div>
              )}
              <div className="flex gap-2">
                <input type="text" value={newProfileName} onChange={(e) => setNewProfileName(e.target.value)} placeholder="Save current as (e.g. Sony + 14mm)" className={`flex-1 p-3 rounded-xl border outline-none font-medium transition-colors ${theme.inputBg} ${theme.inputBorder}`} />
                <button onClick={saveProfile} disabled={!newProfileName.trim()} className={`px-5 rounded-xl font-bold transition-colors flex items-center justify-center disabled:opacity-50 ${theme.btnActive}`}><Save size={18} /></button>
              </div>
            </div>

            <div className={`rounded-2xl p-6 mb-8 text-center border shadow-sm transition-colors ${theme.cardBg} ${theme.border}`}>
              <p className={`text-sm uppercase tracking-widest mb-2 font-bold ${theme.textMuted}`}>Max Shutter Speed</p>
              <div className="text-6xl font-black tracking-tighter my-2">{result ? `${result}s` : '--'}</div>
              <p className={`text-xs mt-3 font-medium ${theme.textMuted}`}>{rule === '500' ? "Standard pinpoint stars" : `NPF tack-sharp stars at ${declination}° declination`}</p>
            </div>

            <div className="flex space-x-2 mb-8">
              <button onClick={() => handleRuleChange('500')} className={`flex-1 py-4 px-4 rounded-xl text-sm font-bold tracking-wide transition-colors ${rule === '500' ? theme.btnActive : theme.btnInactive}`}>RULE OF 500</button>
              <button onClick={() => handleRuleChange('npf')} className={`flex-1 py-4 px-4 rounded-xl text-sm font-bold tracking-wide transition-colors flex justify-center items-center gap-2 ${rule === 'npf' ? theme.btnActive : theme.btnInactive}`}>NPF RULE {!isPro && <Lock size={16} />}</button>
            </div>

            <div className="space-y-6">
              <div>
                <label className="block text-sm font-bold mb-2 flex items-center gap-2"><Camera size={16} /> Sensor Size</label>
                <select value={sensorId} onChange={(e) => setSensorId(e.target.value)} className={`w-full p-4 rounded-xl border appearance-none outline-none font-medium transition-colors ${theme.inputBg} ${theme.inputBorder}`}>
                  {SENSORS.map(s => <option key={s.id} value={s.id}>{s.name} (CF: {s.crop}x)</option>)}
                </select>
              </div>

              <div>
                <label className="block text-sm font-bold mb-2">Focal Length (mm)</label>
                <input type="number" min="1" step="1" value={focalLength} onChange={(e) => setFocalLength(parseFloat(e.target.value) || '')} className={`w-full p-4 rounded-xl border outline-none font-medium transition-colors ${theme.inputBg} ${theme.inputBorder}`} placeholder="e.g., 14" />
              </div>

              <div className={`space-y-6 overflow-hidden transition-all duration-300 ${rule === '500' ? 'opacity-30 pointer-events-none' : 'opacity-100'}`}>
                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-sm font-bold mb-2 flex items-center gap-2"><Aperture size={16} /> Aperture (f/)</label>
                    <input type="number" min="0.5" step="0.1" value={aperture} onChange={(e) => setAperture(parseFloat(e.target.value) || '')} className={`w-full p-4 rounded-xl border outline-none font-medium transition-colors ${theme.inputBg} ${theme.inputBorder}`} placeholder="e.g., 2.8" />
                  </div>
                  <div>
                    <label className="block text-sm font-bold mb-2">Megapixels</label>
                    <input type="number" min="1" step="1" value={megapixels} onChange={(e) => setMegapixels(parseFloat(e.target.value) || '')} className={`w-full p-4 rounded-xl border outline-none font-medium transition-colors ${theme.inputBg} ${theme.inputBorder}`} placeholder="e.g., 24" />
                  </div>
                </div>

                <div className={`p-5 rounded-2xl border shadow-sm ${theme.border} ${theme.cardBg}`}>
                   <label className="flex justify-between text-sm font-bold mb-5"><span className="flex items-center gap-2"><Compass size={18}/> Declination</span><span className="text-lg">{declination}°</span></label>
                   <input type="range" min="0" max="89" value={declination} onChange={(e) => setDeclination(parseInt(e.target.value))} className={`w-full mb-3 ${theme.slider}`} />
                   <div className={`flex justify-between text-xs font-semibold ${theme.textMuted}`}><span>Equator (Fastest)</span><span>Pole (Slowest)</span></div>
                </div>
                
                <div className={`p-4 rounded-xl flex items-start gap-3 text-sm border border-dashed ${theme.border} ${theme.cardBg}`}>
                  <Info size={20} className="shrink-0 mt-0.5" />
                  <p className={`font-medium ${theme.textMuted} leading-relaxed`}>Stars near the celestial equator (0°) move faster than stars near the poles (90°). Adjust the declination based on your framing for longer exposures.</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
